name: opencode
on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    # Trigger if PR opens OR someone types '/oc review'
    if: github.event_name == 'pull_request' || contains(github.event.comment.body, '/oc')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OpenCode Review
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          # Use one of the free high-reasoning models
          model: opencode/big-pickle
          prompt: "Use the 'Senior Architect' agent from AGENTS.md to review this PR."
