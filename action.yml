name: 'Enterprise AI Architect'
description: 'Automated architectural and security review using Google Gemini'
inputs:
  google_api_key:
    description: 'The API key for Google Gemini'
    required: true
  review_depth:
    description: 'Review depth: standard, deep, security'
    default: 'standard'

runs:
  using: 'composite'
  steps:
    - name: Run Gemini Review
      shell: bash
      env:
        GOOGLE_API_KEY: ${{ inputs.google_api_key }}
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        if [ -z "$GOOGLE_API_KEY" ]; then
          echo "Error: GOOGLE_API_KEY is missing."
          exit 1
        fi

        AGENT_RULES=$(cat ${{ github.action_path }}/AGENTS.md)
        PR_DIFF=$(git diff ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
        
        if [ -z "$PR_DIFF" ]; then
          echo "No diff found. Skipping."
          exit 0
        fi

        JSON_PROMPT=$(cat <<EOF | jq -Rs .
        You are a Senior Architect. Review this git diff based on these rules:
        $AGENT_RULES
        Review Depth: ${{ inputs.review_depth }}
        OUTPUT: Markdown table (File, Issue, Severity, Suggested Fix).
        DIFF:
        $PR_DIFF
        EOF
        )

        RESPONSE=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent" \
          -H 'Content-Type: application/json' \
          -H "x-goog-api-key: ${GOOGLE_API_KEY}" \
          -d "{\"contents\": [{\"parts\": [{\"text\": $JSON_PROMPT}]}]}")

        REVIEW_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

        if [ -z "$REVIEW_TEXT" ]; then
          echo "Error: Gemini API failure."
          echo "Debug: $RESPONSE"
          exit 1
        fi

        gh pr comment ${{ github.event.pull_request.number }} --body "$REVIEW_TEXT"
