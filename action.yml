name: 'Enterprise AI Architect'
description: 'Automated architectural and security review using OpenCode Zen'
inputs:
  opencode_api_key:
    description: 'The API key for OpenCode'
    required: true
  review_depth:
    description: 'How deep to review (standard, deep, security)'
    default: 'standard'
runs:
  using: 'composite'
  steps:
    - name: "Install OpenCode CLI"
      shell: bash
      run: |
        curl -fsSL https://opencode.ai/install | bash

    - name: "Analyze Diff"
      shell: bash
      env:
        OPENCODE_API_KEY: ${{ inputs.opencode_api_key }}
      run: |
        git fetch origin ${{ github.event.pull_request.base.sha }}
        git diff ${{ github.event.pull_request.base.sha }}...HEAD > pr_diff.txt
        
        echo "=== DEBUG INFO ==="
        echo "Base SHA: ${{ github.event.pull_request.base.sha }}"
        echo "Action Path: ${{ github.action_path }}"
        echo "Review Depth: ${{ inputs.review_depth }}"
        echo "API Key Length: ${#OPENCODE_API_KEY}"
        echo "Diff File Size: $(stat -c%s "pr_diff.txt" 2>/dev/null || stat -f%z "pr_diff.txt") bytes"
        echo "=================="

        if [ ! -s pr_diff.txt ]; then
          echo "Warning: pr_diff.txt is empty. No changes detected."
          echo "No changes" > report.md
        else
          cat pr_diff.txt | opencode -p "Review this diff using the rules in ${{ github.action_path }}/AGENTS.md. Depth: ${{ inputs.review_depth }}" > report.md
        fi

    - name: "Post PR Comment"
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh pr comment ${{ github.event.pull_request.number }} --body-file report.md
