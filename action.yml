name: 'Enterprise AI Architect'
description: 'Automated architectural and security review using OpenCode Zen'
inputs:
  opencode_api_key:
    description: 'The API key for OpenCode'
    required: true
  review_depth:
    description: 'How deep to review (standard, deep, security)'
    default: 'standard'
runs:
  using: 'composite'
  steps:
    - name: Run OpenCode Review
      uses: anomalyco/opencode/github@latest
      env:
        OPENCODE_API_KEY: ${{ inputs.opencode_api_key }}
        GITHUB_TOKEN: ${{ github.token }}
      with:
        model: opencode/big-pickle
        # Point to the AGENTS.md file inside this Hub repository
        prompt: "Use the 'Senior Architect' agent defined in ${{ github.action_path }}/AGENTS.md to review this PR. Provide the output as a markdown table with columns: File, Issue, Severity, Suggested Fix."
