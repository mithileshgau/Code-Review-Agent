name: 'Enterprise AI Architect'
description: 'Automated architectural and security review using OpenCode Zen'
inputs:
  opencode_api_key:
    description: 'The API key for OpenCode'
    required: true
  review_depth:
    description: 'How deep to review (standard, deep, security)'
    default: 'standard'
runs:
  using: 'composite'
  steps:
    - name: Run OpenCode Review
      uses: anomalyco/opencode/github@latest
      env:
        OPENCODE_API_KEY: ${{ inputs.opencode_api_key }}
        GITHUB_TOKEN: ${{ github.token }}
        DEBUG: 'true'
      with:
        model: opencode/big-pickle
        prompt: |
          Review the provided code changes (diff) based on the "Senior Architect" persona definitions below.
          The output MUST be a markdown table with columns: File, Issue, Severity, Suggested Fix.

          ### Agent Persona & Rules:
          $(cat ${{ github.action_path }}/AGENTS.md)
